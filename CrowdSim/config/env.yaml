scene:
  prim_path: /World/Scene
  z_offset: 0.0
  scene_usd: ../Assets/Warehouse/warehouse_removed.usd
  scene_map: ../Assets/Warehouse/warehouse.yaml


humanoid:
  spawn_xy: null
  human_mesh: false
  hide_humanoid: false
  checkpoint: data/pretrained_models/masked_mimic/smpl/last.ckpt
  motion_file: ../Assets/motion/amass_smpl_validation.pt
  
  min_heading_speed: 0.05

  state_recording:
    enabled: true
    record_fps: 10
    record_dir: output/crowdsim_humanoid_state
    record_envs: "0"
    auto_record: false
    key: H


car:
  usd: nova_carter #jetbot
  prim_name: Car
  z: 0.0
  spawn_xy: null


sensors:
  camera:
    enabled: true
    height: 480
    width: 640
    record_fps: 10.0
    record_dir: output/crowdsim_camera
    record_envs: "0, 1"
    auto_record: true
  lidar:
    enabled: false
    debug_vis: false
    horizontal_res: 1.0
    mesh_prims: [/World/Scene]


navigation:
  enabled: true
  path:
    seed: 7
    planning_step_size: 0.5
    planning_clearance: 0.25
    min_start_goal_distance: 7.0
    max_start_goal_distance: 10.0
    min_spawn_spacing: 1.5
  goal_tolerance: 0.75
  waypoint_tolerance: 0.5
  
  local: 
    method: sfm
    target_timestep: 1
    max_speed: 2
    agent_radius: 0.35
    safe_distance: 0.6
    neighbor_radius: 4.0

  update_hz: 10.0
  log_interval: 30

  recording:
    enabled: true
    output_dir: output/crowdsim_navigation
  



markers:
  enabled: true

viewer:
  camera_mode: free
  camera_eye: [8.0, -8.0, 13.0]
  camera_target: [0.0, 0.0, 1.0]
