rl:
  deterministic: true
  num_neighbors: 4
  map_size: 24
  map_extent: 8.0
  max_linear_velocity: 2.0
  max_angular_velocity: 2.0

  reward:
    progress_reward_scale: 3.0
    goal_reward: 100.0
    collision_penalty: -50.0
    timeout_penalty: -50.0
    time_penalty: -0.1
    max_episode_steps: 400
  

network:
  hidden_dim: 256
  num_layers: 2

training:
  total_steps: 200000
  rollout_steps: 256
  ppo_epochs: 4
  minibatch_size: 256
  lr: 0.0003
  save_interval: 20000
  output_dir: output/crowdsim_robot_ppo
