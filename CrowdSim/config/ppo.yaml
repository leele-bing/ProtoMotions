rl:
  policy_checkpoint: null
  deterministic: true
  num_neighbors: 4
  progress_reward_scale: 3.0
  goal_reward: 30.0
  collision_penalty: -30.0
  timeout_penalty: -30.0
  time_penalty: -0.03
  max_episode_steps: 600
  map_size: 24
  map_extent: 8.0

network:
  hidden_dim: 128

training:
  total_steps: 200000
  rollout_steps: 256
  ppo_epochs: 4
  minibatch_size: 256
  lr: 0.0003
  save_interval: 20000
  output_dir: output/crowdsim_robot_ppo
